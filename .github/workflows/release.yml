name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. v1.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Refresh picotool (macOS arm64)
        run: |
          brew install picotool
          mkdir -p resources/tools/macos
          cp "$(which picotool)" resources/tools/macos/picotool
          xattr -c resources/tools/macos/picotool || true

      - name: Build .app with PyInstaller
        run: python -m PyInstaller installer/fdd_updater.spec --clean --noconfirm

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "FDD Firmware Updater" \
            -srcfolder "dist/FDD Firmware Updater.app" \
            -ov -format UDZO \
            "dist/FDD-Firmware-Updater-macOS.dmg"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/FDD-Firmware-Updater-macOS.dmg

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build one-file EXE with PyInstaller
        run: python -m PyInstaller installer/fdd_updater_windows.spec --clean --noconfirm

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: "dist/FDD Firmware Updater.exe"
